services:
  app:
    build: .
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - appsec_data:/app/data
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    expose:
      - "8000"

  caddy:
    image: caddy:2.8-alpine
    restart: unless-stopped
    depends_on:
      - app
    dns:
      - 1.1.1.1
      - 8.8.8.8
    environment:
      DOMAIN: ${DOMAIN}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  appsec_data:
  caddy_data:
  caddy_config:
